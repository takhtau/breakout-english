<!DOCTYPE html>
<html>
<head>
    <title>Панель учителя</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 1200px;
            margin: 40px auto;
            padding: 20px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }
        th, td {
            border: 1px solid #ddd;
            padding: 10px;
            text-align: left;
        }
        th {
            background: #4CAF50;
            color: white;
        }
        .btn {
            background: #4CAF50;
            color: white;
            padding: 6px 12px;
            text-decoration: none;
            border-radius: 4px;
        }
    </style>
</head>
<body>
    <h1>📊 Панель учителя</h1>
    <p>Добро пожаловать, <strong>{{ request.user.username }}</strong>! | <a href="{% url 'admin:logout' %}">Выйти</a></p>

    <h2>Список тестов</h2>
    <table>
        <thead>
            <tr>
                <th>Название теста</th>
                <th>Вопросов</th>
                <th>Попыток</th>
                <th>Действия</th>
            </tr>
        </thead>
        <tbody>
            {% for test in tests %}
            <tr>
                <td>{{ test.title }}</td>
                <td>{{ test.question_set.count }}</td>
                <td>{{ test.result_set.count }}</td>
                <td>
                    <a class="btn" href="{% url 'test_results' test.id %}">Результаты</a>
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</body>
</html>
