<!DOCTYPE html>
<html>
<head>
    <title>{{ test.title }}</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
            background: #f0f4f8;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .entry-card {
            background: white;
            padding: 40px;
            border-radius: 14px;
            box-shadow: 0 6px 24px rgba(0,0,0,0.08);
            width: 420px;
            max-width: 90%;
        }
        h2 {
            text-align: center;
            font-size: 22px;
            margin-bottom: 5px;
        }
        .test-title {
            text-align: center;
            font-size: 14px;
            color: #777;
            margin-bottom: 25px;
        }
        input {
            width: 100%;
            padding: 12px 14px;
            margin: 8px 0;
            border: 1px solid #ddd;
            border-radius: 10px;
            font-size: 16px;
        }
        button {
            width: 100%;
            padding: 12px;
            background: #389bd9;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            cursor: pointer;
            transition: 0.2s;
            margin-top: 10px;
        }
        button:hover { transform: translateY(-2px); filter: brightness(0.95); }
        .errorlist {
            color: #E5543F;
            font-size: 14px;
            list-style: none;
            padding: 0;
        }
    </style>
</head>
<body>

<div class="entry-card">
    <h2>📝 {{ test.title }}</h2>
    <div class="test-title">Введите имя и фамилию, чтобы начать</div>

    <form method="post">
        {% csrf_token %}
        {{ student_form.as_p }}
        <button type="submit" name="student_login">Начать</button>
    </form>
</div>

</body>
</html>
