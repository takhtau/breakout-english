<!DOCTYPE html>
<html>
<head>
    <title>{{ test.title }}</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
            background: #f0f4f8;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .entry-card {
            background: white;
            padding: 40px;
            border-radius: 14px;
            box-shadow: 0 6px 24px rgba(0,0,0,0.08);
            width: 420px;
            max-width: 90%;
        }
        h2 {
            text-align: center;
            font-size: 22px;
            margin-bottom: 5px;
        }
        .test-title {
            text-align: center;
            font-size: 14px;
            color: #777;
            margin-bottom: 25px;
        }
        input {
            width: 100%;
            padding: 12px 14px;
            margin: 8px 0;
            border: 1px solid #ddd;
            border-radius: 10px;
            font-size: 16px;
        }
        button {
            width: 100%;
            padding: 12px;
            background: #389bd9;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            cursor: pointer;
            transition: 0.2s;
            margin-top: 10px;
        }
        button:hover { transform: translateY(-2px); filter: brightness(0.95); }
        .errorlist {
            color: #E5543F;
            font-size: 14px;
            list-style: none;
            padding: 0;
        }
    </style>
</head>
<body>

<div class="entry-card">
    <h2>📝 {{ test.title }}</h2>
    <div class="test-title">Введите имя и фамилию, чтобы начать</div>

    <form method="post">
        {% csrf_token %}
        {{ student_form.as_p }}
        <button type="submit" name="student_login">Начать</button>
    </form>

    <div style="text-align: center; margin-top: 20px; padding-top: 15px; border-top: 1px solid #eef3f7;">
        {% if user.is_authenticated and user.is_staff %}
            <a href="{% url 'test_results' test.id %}"
               style="background: transparent; color: #bbb; padding: 8px 16px; border-radius: 10px; border: 1px solid #e0e0e0; text-decoration: none; font-size: 13px; transition: 0.2s; display: inline-block;"
               onmouseover="this.style.color='#999'; this.style.borderColor='#ccc'"
               onmouseout="this.style.color='#bbb'; this.style.borderColor='#e0e0e0'">
                👨‍🏫 Для учителя
            </a>
        {% else %}
            <a href="{% url 'teacher_results_redirect' test.id %}"
               style="background: transparent; color: #ccc; padding: 8px 16px; border-radius: 10px; border: 1px solid #eee; text-decoration: none; font-size: 13px; transition: 0.2s; display: inline-block;"
               onmouseover="this.style.color='#aaa'; this.style.borderColor='#ddd'"
               onmouseout="this.style.color='#ccc'; this.style.borderColor='#eee'">
                👨‍🏫 Войти как преподаватель
            </a>
        {% endif %}
    </div>
</div>

</body>
</html>
