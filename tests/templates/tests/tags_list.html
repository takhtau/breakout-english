<!DOCTYPE html>
<html>
<head>
    <title>Управление тегами</title>
    <style>
        body { font-family: Arial; max-width: 800px; margin: 40px auto; padding: 20px; }
        table { width: 100%; border-collapse: collapse; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
        th { background: #4CAF50; color: white; }
        .btn { background: #4CAF50; color: white; padding: 5px 10px; text-decoration: none; border-radius: 4px; }
        .btn-danger { background: #dc3545; }
    </style>
</head>
<body>
    <h1>🏷️ Управление тегами</h1>
    <a href="{% url 'tag_add' %}" class="btn">➕ Создать тег</a>
    <a href="{% url 'admin_panel' %}" class="btn">← Назад</a>
    
    <table>
        <thead>
            <tr><th>Название</th><th>Цвет</th><th>Действия</th></tr>
        </thead>
        <tbody>
            {% for tag in tags %}
            <tr>
                <td><span style="background: {{ tag.color }}; padding: 2px 8px; border-radius: 12px; color: white;">{{ tag.name }}</span></td>
                <td>{{ tag.color }}</td>
                <td>
                    <a href="{% url 'tag_edit' tag.id %}" class="btn">✏️</a>
                    <a href="{% url 'tag_delete' tag.id %}" class="btn btn-danger" onclick="return confirm('Удалить тег?')">🗑️</a>
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</body>
</html>
