<!DOCTYPE html>
<html>
<head>
    <title>Управление пользователями</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 40px; }
        .container { max-width: 1000px; margin: 0 auto; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
        th { background: #4CAF50; color: white; }
        .btn { display: inline-block; padding: 4px 8px; background: #2196F3; color: white; text-decoration: none; border-radius: 4px; font-size: 12px; }
        .btn-danger { background: #dc3545; }
        .role-select { padding: 4px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>👥 Управление пользователями</h1>
        <a href="{% url 'admin_panel' %}" class="btn">← Назад</a>
        
        <table>
            <thead>
                <tr>
                    <th>Логин</th>
                    <th>Email</th>
                    <th>Имя</th>
                    <th>Фамилия</th>
                    <th>Роль</th>
                    <th>Действия</th>
                </tr>
            </thead>
            <tbody>
                {% for user in users %}
                <tr>
                    <td>{{ user.username }}</td>
                    <td>{{ user.email }}</td>
                    <td>{{ user.first_name }}</td>
                    <td>{{ user.last_name }}</td>
                    <td>
                        <form method="post" action="{% url 'change_role' user.id %}" style="display: inline;">
                            {% csrf_token %}
                            <select name="role" class="role-select" onchange="this.form.submit()">
                                <option value="teacher" {% if user.role == 'teacher' %}selected{% endif %}>Учитель</option>
                                <option value="moderator" {% if user.role == 'moderator' %}selected{% endif %}>Модератор</option>
                            </select>
                        </form>
                    </td>
                    <td>
                        <a href="{% url 'delete_user' user.id %}" class="btn btn-danger" onclick="return confirm('Удалить пользователя {{ user.username }}?')">🗑️</a>
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</body>
</html>
