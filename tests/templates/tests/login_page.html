<!DOCTYPE html>
<html>
<head>
    <title>Вход</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
            background: #f0f4f8;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .login-card {
            background: white;
            padding: 40px;
            border-radius: 14px;
            box-shadow: 0 6px 24px rgba(0,0,0,0.08);
            width: 400px;
            max-width: 90%;
        }
        h1 { font-size: 28px; text-align: center; margin-bottom: 25px; }
        input {
            width: 100%;
            padding: 12px 14px;
            margin: 10px 0;
            border: 1px solid #ddd;
            border-radius: 10px;
            font-size: 16px;
        }
        button {
            width: 100%;
            padding: 12px;
            background: #389bd9;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            cursor: pointer;
            transition: 0.2s;
            margin-top: 10px;
        }
        button:hover { transform: translateY(-2px); filter: brightness(0.95); }
        .errorlist {
            color: #E5543F;
            font-size: 14px;
            list-style: none;
            padding: 0;
            margin: 5px 0;
        }
        .back-link {
            display: block;
            text-align: center;
            margin-top: 15px;
            color: #777;
            text-decoration: none;
            font-size: 14px;
        }
    </style>
</head>
<body>
<div class="login-card">
    <h1>🔐 Вход</h1>
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Войти</button>
    </form>
    <a href="/" class="back-link">← На главную</a>
</div>
</body>
</html>
