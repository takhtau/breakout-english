<!DOCTYPE html>
<html>
<head>
    <title>Ошибка</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
            background: #f0f4f8;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .error-card {
            background: white;
            padding: 40px;
            border-radius: 14px;
            box-shadow: 0 6px 24px rgba(0,0,0,0.08);
            text-align: center;
            width: 400px;
            max-width: 90%;
        }
        h1 { font-size: 22px; color: #E5543F; margin-bottom: 15px; }
        p { color: #777; margin-bottom: 20px; }
        a {
            color: #389bd9;
            text-decoration: none;
            font-size: 14px;
        }
    </style>
</head>
<body>

<div class="error-card">
    <h1>⚠️ Ошибка</h1>
    <p>{{ error }}</p>
    <a href="/">← На главную</a>
</div>

</body>
</html>
