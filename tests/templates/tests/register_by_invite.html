<!DOCTYPE html>
<html>
<head>
    <title>Регистрация по приглашению</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
            background: #f0f4f8;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .register-card {
            background: white;
            padding: 40px;
            border-radius: 14px;
            box-shadow: 0 6px 24px rgba(0,0,0,0.08);
            width: 440px;
            max-width: 90%;
        }
        h1 { font-size: 28px; text-align: center; margin-bottom: 10px; }
        .role-info {
            text-align: center;
            font-size: 14px;
            color: #777;
            margin-bottom: 25px;
            background: #f9fbfd;
            padding: 10px;
            border-radius: 10px;
            border: 1px solid #e6edf3;
        }
        input {
            width: 100%;
            padding: 12px 14px;
            margin: 10px 0;
            border: 1px solid #ddd;
            border-radius: 10px;
            font-size: 16px;
        }
        button {
            width: 100%;
            padding: 12px;
            background: #389bd9;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            cursor: pointer;
            transition: 0.2s;
            margin-top: 10px;
        }
        button:hover { transform: translateY(-2px); filter: brightness(0.95); }
        .errorlist {
            color: #E5543F;
            font-size: 14px;
            list-style: none;
            padding: 0;
        }
    </style>
</head>
<body>

<div class="register-card">
    <h1>📝 Регистрация</h1>
    <div class="role-info">Вы приглашены как: <strong>{{ role }}</strong></div>

    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Зарегистрироваться</button>
    </form>
</div>

</body>
</html>
